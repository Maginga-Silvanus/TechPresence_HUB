<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apply</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-text">
                <h2>Tech Presence</h2>
            </div>
            <button class="collapse-btn" id="collapseBtn" title="Collapse Sidebar">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
        </div>

        <ul class="menu">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> <span>Home</span></a></li>
            <li><a href="profile.html"><i class="fa-solid fa-user"></i> <span>Profile</span></a></li>
            <li><a href="tasks.html"><i class="fa-solid fa-list-check"></i> <span>Tasks</span></a></li>
            <li><a href="submission.html"><i class="fa-solid fa-upload"></i> <span>Submission</span></a></li>
            <li class="active"><a href="apply.html"><i class="fa-solid fa-file"></i> <span>Apply</span></a></li>
            <li><a href="withdraw.html"><i class="fa-solid fa-money-bill-transfer"></i> <span>Withdraw</span></a></li>
            <li><a href="training.html"><i class="fa-solid fa-graduation-cap"></i> <span>Training</span></a></li>
            <li><a href="payments.html"><i class="fa-solid fa-dollar-sign"></i> <span>Payments</span></a></li>
            <li><a href="referrals.html"><i class="fa-solid fa-user-plus"></i> <span>Refer</span></a></li>
            <li><a href="legal.html"><i class="fa-solid fa-scale-balanced"></i> <span>Legal</span></a></li>
        </ul>

        <div class="sidebar-footer">
            <div class="profile">
                <img src="https://i.pravatar.cc/50" alt="profile">
                <span id="sidebarName">User</span>
            </div>

            <button class="logout" data-logout>
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </div>
    </aside>

    <main class="main-content">

        <header>
            <h1>Apply</h1>
        </header>

        <div class="notice" id="applicationNotice">
            Fill in your details and submit your application for admin review.
        </div>

        <section class="profile-section">
            <form id="applicationForm" class="application-form">
                <div>
                    <label for="appFullName">Full Names</label>
                    <input id="appFullName" type="text" required>
                </div>

                <div>
                    <label for="appEducation">Education Level</label>
                    <input id="appEducation" type="text" required>
                </div>

                <div>
                    <label for="appOccupation">Current Occupation</label>
                    <input id="appOccupation" type="text" required>
                </div>

                <div>
                    <label for="appWorkType">Work Type</label>
                    <select id="appWorkType" required>
                        <option value="">Select work type</option>
                        <option value="Full time">Full time</option>
                        <option value="Part time">Part time</option>
                    </select>
                </div>

                <div>
                    <label for="appLocation">Location</label>
                    <input id="appLocation" type="text" required>
                </div>

                <div>
                    <label for="appContacts">Contacts</label>
                    <input id="appContacts" type="text" required>
                </div>

                <div class="full-row">
                    <label for="appReason">Reason Why You Need The Job</label>
                    <textarea id="appReason" required></textarea>
                </div>

                <div class="full-row">
                    <label for="appAbout">About Yourself</label>
                    <textarea id="appAbout" required></textarea>
                </div>

                <button type="submit">
                    Submit Application
                </button>
            </form>
        </section>

    </main>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
</body>
</html>
