<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Funds</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>
<div class="container">
    <aside class="sidebar">
        <div class="logo">
            <div class="logo-text"><h2>Tech Presence</h2></div>
            <button class="collapse-btn" id="collapseBtn"><i class="fa-solid fa-chevron-left"></i></button>
        </div>
        <ul class="menu">
            <li><a href="index.html"><i class="fa-solid fa-house"></i> <span>Home</span></a></li>
            <li><a href="profile.html"><i class="fa-solid fa-user"></i> <span>Profile</span></a></li>
            <li><a href="tasks.html"><i class="fa-solid fa-list-check"></i> <span>Tasks</span></a></li>
            <li><a href="submission.html"><i class="fa-solid fa-upload"></i> <span>Submission</span></a></li>
            <li><a href="apply.html"><i class="fa-solid fa-file"></i> <span>Apply</span></a></li>
            <li class="active"><a href="withdraw.html"><i class="fa-solid fa-money-bill-transfer"></i> <span>Withdraw</span></a></li>
            <li><a href="training.html"><i class="fa-solid fa-graduation-cap"></i> <span>Training</span></a></li>
            <li><a href="payments.html"><i class="fa-solid fa-dollar-sign"></i> <span>Payments</span></a></li>
            <li><a href="referrals.html"><i class="fa-solid fa-user-plus"></i> <span>Refer</span></a></li>
            <li><a href="legal.html"><i class="fa-solid fa-scale-balanced"></i> <span>Legal</span></a></li>
        </ul>
        <div class="sidebar-footer">
            <div class="profile"><img src="https://i.pravatar.cc/50" alt="profile"><span id="sidebarName">User</span></div>
            <button class="logout" data-logout><i class="fa-solid fa-right-from-bracket"></i><span>Logout</span></button>
        </div>
    </aside>

    <main class="main-content">
        <header><h1>Withdrawals</h1></header>

        <section class="stats">
            <div class="stat-card green">
                <div class="stat-label"><i class="fa-solid fa-wallet"></i> Available Balance</div>
                <div class="stat-value" id="currentBalance">$0.00</div>
                <div class="stat-subtitle">Minimum withdrawal: $100</div>
            </div>
        </section>

        <section class="profile-section">
            <h2>Request Withdrawal</h2>
            <form id="withdrawForm" class="application-form">
                <div>
                    <label for="withdrawAmount">Amount to Withdraw ($)</label>
                    <input id="withdrawAmount" type="number" min="100" step="0.01" required placeholder="Enter amount (min $100)">
                </div>
                <div>
                    <label for="withdrawMethod">Payment Method</label>
                    <select id="withdrawMethod" required>
                        <option value="">Select Method</option>
                        <option value="Bank Transfer">Bank Transfer</option>
                        <option value="PayPal">PayPal</option>
                        <option value="Mobile Money">Mobile Money</option>
                    </select>
                </div>
                <div class="full-row">
                    <button type="submit" id="withdrawSubmitBtn">Initiate Withdrawal</button>
                </div>
            </form>
        </section>

        <section class="profile-section" style="margin-top:30px;">
            <h2>Withdrawal History</h2>
            <div id="withdrawList"></div>
        </section>
    </main>
</div>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="script.js"></script>
<script>
    if (window.innerWidth <= 768) {
        const sidebar = document.querySelector(".sidebar");
        const collapseBtn = document.getElementById("collapseBtn");
        sidebar.classList.add("collapsed");
        if (collapseBtn) collapseBtn.innerHTML = '<i class="fa-solid fa-chevron-right"></i>';
    }
    if (typeof renderUserSubmissions === 'function') renderUserSubmissions();
</script>
</body>
</html>
