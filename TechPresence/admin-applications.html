<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Applications</title>
    <link rel="stylesheet" href="admin.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
</head>
<body>

<div class="container">

    <aside class="sidebar">
        <div class="logo">
            <div class="logo-text">
                <h2>Tech Presence</h2>
            </div>
            <button class="collapse-btn" id="collapseBtn" title="Collapse Sidebar">
                <i class="fas fa-chevron-left"></i>
            </button>
        </div>

        <ul class="menu">
            <li><a href="admin.html"><i class="fas fa-chart-line"></i> <span>Dashboard</span></a></li>
            <li><a href="admin-users.html"><i class="fas fa-users"></i> <span>Users</span></a></li>
            <li><a href="admin-tasks.html"><i class="fas fa-list-check"></i> <span>Tasks</span></a></li>
            <li><a href="admin-training.html"><i class="fas fa-graduation-cap"></i> <span>Training</span></a></li>
            <li><a href="admin-approvals.html"><i class="fas fa-circle-check"></i> <span>Approvals</span></a></li>
            <li><a href="admin-payments.html"><i class="fas fa-wallet"></i> <span>Payments</span></a></li>
            <li><a href="admin-settings.html"><i class="fas fa-gear"></i> <span>Settings</span></a></li>
        </ul>
        <button class="logout" id="logoutBtn">
            <i class="fas fa-right-from-bracket"></i>
            <span>Logout</span>
        </button>
    </aside>

    <main class="content">
        <header>
            <h1>User Applications</h1>
        </header>

        <div class="stats" style="margin-bottom:30px;">
            <div class="stat-card">
                <h4>Total Applications</h4>
                <h2 id="applicationsTotal">0</h2>
            </div>
            <div class="stat-card orange">
                <h4>Pending</h4>
                <h2 id="applicationsPending">0</h2>
            </div>
            <div class="stat-card green">
                <h4>Approved</h4>
                <h2 id="applicationsApproved">0</h2>
            </div>
            <div class="stat-card blue">
                <h4>Declined</h4>
                <h2 id="applicationsDeclined">0</h2>
            </div>
        </div>

        <div class="table-section">
            <h2>Applications</h2>
            <table>
                <thead>
                    <tr>
                        <th>User</th>
                        <th>Work Type</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="applicationsTable"></tbody>
            </table>
        </div>

        <div class="table-section">
            <h2>Submitted Tasks</h2>
            <table>
                <thead>
                    <tr>
                        <th>Title</th>
                        <th>User</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="adminSubmissionTable"></tbody>
            </table>
        </div>
    </main>

</div>

<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="auth.js"></script>
<script src="admin.js"></script>
</body>
</html>
